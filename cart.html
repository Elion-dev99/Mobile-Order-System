<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F2F2F7">
  <title>カート | QuickOrder</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="page-header">
  <button class="back-btn" id="backBtn">‹ メニュー</button>
  <div class="page-title">カート</div>
  <div style="width:80px;"></div>
</header>

<main class="cart-content">

  <div class="cart-section-title">注文内容</div>
  <div id="cartItems"></div>

  <div id="reorderSection" class="hidden">
    <div class="cart-section-title">前回の注文</div>
    <div class="cart-items-group" id="reorderList"></div>
  </div>

  <div class="cart-section-title">お会計</div>
  <div class="order-summary">
    <div class="summary-row">
      <span>小計</span><span id="subtotalAmount">¥0</span>
    </div>
    <div class="summary-row">
      <span>消費税（10%）</span><span id="taxAmount">¥0</span>
    </div>
    <div class="summary-row total">
      <span>合計</span><span class="amount" id="totalAmount">¥0</span>
    </div>
  </div>

  <div class="cart-section-title">割り勘</div>
  <div class="split-section">
    <div class="split-title">👥 人数で割り勘</div>
    <div class="split-controls">
      <button class="split-btn" id="splitMinus">−</button>
      <div class="split-num" id="splitNum">1</div>
      <button class="split-btn" id="splitPlus">＋</button>
      <span class="split-result">人</span>
    </div>
    <div id="splitResult" class="hidden">
      <span class="split-amount" id="splitAmount"></span>
    </div>
  </div>

  <div style="height:8px;"></div>
</main>

<div class="place-order-bar">
  <button class="place-order-btn" id="placeOrderBtn" disabled>注文を確定する</button>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module" src="js/cart.js"></script>
</body>
</html>
