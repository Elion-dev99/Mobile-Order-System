<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1C1C1E">
  <title>厨房モニター | QuickOrder</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-page">

<div class="admin-header">
  <div>
    <h1>厨房モニター</h1>
    <div style="font-size:12px;color:#8E8E93;margin-top:2px;" id="adminClock"></div>
  </div>
  <div class="admin-badge" id="pendingCount">0件</div>
</div>

<div class="admin-tabs">
  <button class="admin-tab active" onclick="AdminPage.setFilter('received',this)">受付済み</button>
  <button class="admin-tab" onclick="AdminPage.setFilter('cooking',this)">調理中</button>
  <button class="admin-tab" onclick="AdminPage.setFilter('done',this)">完了</button>
  <button class="admin-tab" onclick="AdminPage.setFilter('all',this)">すべて</button>
</div>

<div class="admin-content" id="adminContent">
  <div style="text-align:center;padding:60px 20px;color:#8E8E93;">
    <div style="font-size:36px;margin-bottom:12px;">⏳</div>
    <div style="font-size:15px;">Firestoreに接続中...</div>
  </div>
</div>

<div style="padding:20px;text-align:center;">
  <button onclick="AdminPage.clearAll()" style="color:#FF453A;font-size:14px;font-weight:500;background:none;border:none;cursor:pointer;">注文履歴をリセット</button>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
